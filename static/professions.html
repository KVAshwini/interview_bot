<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interview Help Bot - Professions</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body data-ui="professions">
  <header>
    <div class="wrap top">
      <h1>Profession Interview Bot</h1>
      <div class="top-actions">
        <a class="nav-link" href="/">DevOps UI</a>
        <a class="nav-link" href="/packs">Pack Manager</a>
        <button class="secondary" id="opacity-toggle" type="button" aria-pressed="false">Transparent</button>
        <div class="status">Multi-profession library • local SQLite</div>
      </div>
    </div>
  </header>
  <main class="wrap">
    <aside>
      <label for="question">Question or scenario</label>
      <textarea id="question" placeholder="Example: How do you handle flaky automated tests?"></textarea>
      <div class="controls">
        <select id="mode" aria-label="Answer mode">
          <option value="instant">Instant</option>
          <option value="detailed">Detailed</option>
        </select>
        <select id="voice" aria-label="Voice style">
          <option value="natural">Natural</option>
          <option value="raw">Raw</option>
        </select>
        <select id="category-filter" aria-label="Profession">
          <option value="all">All</option>
          <option value="developer">Developer - General</option>
          <option value="developer_python">Developer - Python</option>
          <option value="developer_java">Developer - Java</option>
          <option value="developer_sql">Developer - SQL</option>
          <option value="developer_fullstack">Developer - Full Stack</option>
          <option value="qa">QA Engineer</option>
          <option value="data_engineer">Data Engineer</option>
          <option value="data_analyst">Data Analyst</option>
          <option value="business_analyst">Business Analyst</option>
          <option value="project_manager">Project Manager</option>
          <option value="product_manager">Product Manager</option>
          <option value="cybersecurity">Cybersecurity</option>
          <option value="cloud_engineer">Cloud Engineer</option>
          <option value="database_admin">Database Admin</option>
          <option value="behavioral">Behavioral</option>
        </select>
        <select id="view" aria-label="View mode">
          <option value="full">Full</option>
          <option value="interview">Interview</option>
        </select>
        <button class="primary" id="ask">Answer</button>
        <button class="secondary" id="voice-input" type="button">Voice</button>
        <button class="secondary" id="clear">Clear</button>
      </div>
      <div class="health" id="health">Checking library...</div>
      <div class="chips" id="examples"></div>
      <div class="review-panel">
        <div class="review-head">
          <strong>Missed questions</strong>
          <button class="secondary small" id="refresh-missed" type="button">Refresh</button>
        </div>
        <div id="missed" class="missed-list"></div>
      </div>
    </aside>
    <section>
      <div id="result" class="empty">Ask a question to pull the closest profession-specific answer.</div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
