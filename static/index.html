<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interview Help Bot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <div class="wrap top">
      <h1>Interview Help Bot</h1>
      <div class="top-actions">
        <button class="secondary" id="opacity-toggle" type="button" aria-pressed="false">Transparent</button>
        <div class="status">Local cache • SQLite • no network required</div>
      </div>
    </div>
  </header>
  <main class="wrap">
    <aside>
      <label for="question">Question or scenario</label>
      <textarea id="question" placeholder="Example: Production is down and users cannot login. What do you do?"></textarea>
      <div class="controls">
        <select id="mode" aria-label="Answer mode">
          <option value="instant">Instant</option>
          <option value="detailed">Detailed</option>
        </select>
        <select id="voice" aria-label="Voice style">
          <option value="natural">Natural</option>
          <option value="raw">Raw</option>
        </select>
        <select id="category-filter" aria-label="Focus area">
          <option value="all">All</option>
          <option value="devops">DevOps</option>
          <option value="developer">Developer</option>
          <option value="qa">QA</option>
          <option value="data_engineer">Data Engineer</option>
          <option value="data_analyst">Data Analyst</option>
          <option value="business_analyst">Business Analyst</option>
          <option value="project_manager">Project Manager</option>
          <option value="product_manager">Product Manager</option>
          <option value="cybersecurity">Cybersecurity</option>
          <option value="cloud_engineer">Cloud Engineer</option>
          <option value="database_admin">Database Admin</option>
          <option value="kubernetes">Kubernetes</option>
          <option value="azure">Azure</option>
          <option value="terraform">Terraform</option>
          <option value="linux">Linux</option>
          <option value="scenario">Scenario</option>
          <option value="behavioral">Behavioral</option>
        </select>
        <select id="view" aria-label="View mode">
          <option value="full">Full</option>
          <option value="interview">Interview</option>
        </select>
        <button class="primary" id="ask">Answer</button>
        <button class="secondary" id="voice-input" type="button">Voice</button>
        <button class="secondary" id="clear">Clear</button>
      </div>
      <div class="health" id="health">Checking library...</div>
      <div class="chips" id="examples"></div>
      <div class="review-panel">
        <div class="review-head">
          <strong>Missed questions</strong>
          <button class="secondary small" id="refresh-missed" type="button">Refresh</button>
        </div>
        <div id="missed" class="missed-list"></div>
      </div>
    </aside>
    <section>
      <div id="result" class="empty">Ask a question to pull the closest local answer.</div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
